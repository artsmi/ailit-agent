[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "ailit-agent"
version = "0.1.0"
description = "Local AI agent runtime core (provider layer)"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27",
    "pyyaml>=6",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
]

[tool.setuptools.packages.find]
where = ["tools"]
include = ["agent_core*"]

[tool.pytest.ini_options]
pythonpath = ["tools"]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "integration: сетевые live-тесты (ключ и явное согласие)",
]

[tool.ruff]
line-length = 100
target-version = "py310"
